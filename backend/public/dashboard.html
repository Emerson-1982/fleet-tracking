<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Frota</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #map {
      height: 65vh;
      width: 100%;
      margin-top: 10px;
    }

    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-movimento { background-color: green; }
    .status-aguardando { background-color: gold; }
    .status-parado { background-color: red; }

    .panel {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>Monitoramento de Veículos</h2>

<!-- ✅ PASSO 2 – Painel para digitar veículo -->
<div class="panel">
  <strong>Iniciar veículo no dashboard</strong><br><br>
  <input type="text" id="vehicleId" placeholder="Ex: CAM-01">
  <button onclick="startDashboardVehicle()">Iniciar</button>
</div>

<!-- ✅ Status -->
<p>
  <span id="statusIndicator" class="status-dot status-movimento"></span>
  <span id="statusText">Aguardando o início...</span><br>
  <strong>Total parado hoje:</strong>
  <span id="dailyStopped">00:00:00</span>
</p>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map("map").setView([-22.30, -53.85], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  var markers = {};
  var polylines = {};
  var tracks = {};

  var dailyStoppedTime = 0;
  var lastDay = new Date().toDateString();

  var STOP_DISTANCE = 20;
  var STOP_TIME = 3 * 60 * 1000;

  // ✅ PASSO 3 – Criar veículo direto no dashboard
  function startDashboardVehicle() {
    var vehicleId = document.getElementById("vehicleId").value.trim();
    if (!vehicleId) {
      alert("Informe o ID do veículo");
      return;
    }

    if (!tracks[vehicleId]) {
      tracks[vehicleId] = [];
    }

    var center = map.getCenter();
    tracks[vehicleId].push([center.lat, center.lng]);

    markers[vehicleId] = L.marker([center.lat, center.lng])
      .addTo(map)
      .bindPopup("Veículo: " + vehicleId)
      .openPopup();

    polylines[vehicleId] = L.polyline(tracks[vehicleId], {
      color: "blue",
      weight: 4
    }).addTo(map);

    document.getElementById("statusText").innerText =
      "Veículo: " + vehicleId + " | Status: MOVIMENTO";

    setStatusIndicator("MOVIMENTO");

    document.getElementById("vehicleId").value = "";
  }

  // ✅ PASSO 4 – Atualizar bolinha de status
  function setStatusIndicator(status) {
    var indicator = document.getElementById("statusIndicator");
    indicator.className = "status-dot";

    if (status === "MOVIMENTO") indicator.classList.add("status-movimento");
    if (status === "AGUARDANDO PARADA") indicator.classList.add("status-aguardando");
    if (status === "PARADO") indicator.classList.add("status-parado");
  }

  function formatTime(ms) {
    var s = Math.floor(ms / 1000);
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = s % 60;
    return (
      String(h).padStart(2, "0") + ":" +
      String(m).padStart(2, "0") + ":" +
      String(sec).padStart(2, "0")
    );
  }
</script>

</body>
</html>
