<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Frota</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #map {
      height: 70vh;
      width: 100%;
      margin-top: 10px;
    }

    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-movimento { background-color: green; }
    .status-aguardando { background-color: gold; }
    .status-parado { background-color: red; }
  </style>
</head>
<body>

<h2>Monitoramento de Veículos</h2>

  <div style="display: flex;">

    <!-- SIDEBAR -->
    <div id="sidebar" style="width: 220px; padding: 8px; border-right: 1px solid #ccc;">
      <h4>Veículos</h4>
      <div id="vehicleList">
        <!-- Checkboxes gerados dinamicamente -->
      </div>
    </div>

    <!-- MAPA -->
    <div style="flex: 1;">
      <div id="map"></div>
    </div>

  </div>



  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

 <script>
  var map = L.map("map").setView([-22.30, -53.85], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  var markers = {};
  var polylines = {};
  var tracks = {};
  var visibleVehicles = {};
  var colors = ["red", "blue", "green", "orange", "purple", "brown"];

  function updateVehicleList(vehicles) {
    var list = document.getElementById("vehicleList");
    list.innerHTML = "";

    Object.keys(vehicles).forEach(function (id, index) {
      if (!(id in visibleVehicles)) visibleVehicles[id] = true;

      var checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = visibleVehicles[id];
      checkbox.onchange = function () {
        visibleVehicles[id] = this.checked;
        toggleVehicle(id);
      };

      var label = document.createElement("label");
      label.innerText = " " + id;
      label.style.display = "block";

      label.prepend(checkbox);
      list.appendChild(label);
    });
  }

  function toggleVehicle(id) {
    if (!visibleVehicles[id]) {
      if (markers[id]) map.removeLayer(markers[id]);
      if (polylines[id]) map.removeLayer(polylines[id]);
    } else {
      if (markers[id]) markers[id].addTo(map);
      if (polylines[id]) polylines[id].addTo(map);
    }
  }

  function atualizarVeiculos() {
    fetch("/api/vehicles")
      .then(res => res.json())
      .then(data => {
        updateVehicleList(data);

        var index = 0;
        for (var id in data) {
          var lat = data[id].latitude;
          var lon = data[id].longitude;

          if (!tracks[id]) tracks[id] = [];
          tracks[id].push([lat, lon]);

          var color = colors[index % colors.length];
          index++;

          if (!markers[id]) {
            markers[id] = L.marker([lat, lon])
              .bindPopup("Veículo: " + id);
            if (visibleVehicles[id]) markers[id].addTo(map);
          } else {
            markers[id].setLatLng([lat, lon]);
          }

          if (!polylines[id]) {
            polylines[id] = L.polyline(tracks[id], {
              color: color,
              weight: 4
            });
            if (visibleVehicles[id]) polylines[id].addTo(map);
          } else {
            polylines[id].setLatLngs(tracks[id]);
          }
        }
      });
  }

  setInterval(atualizarVeiculos, 5000);
</script>
</body>
</html>
