<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Frota</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #map {
      height: 70vh;
      width: 100%;
      margin-top: 10px;
    }

    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-movimento { background-color: green; }
    .status-aguardando { background-color: gold; }
    .status-parado { background-color: red; }
  </style>
</head>
<body>

  <h2>Monitoramento de Veículos</h2>

  <label>
    Identificação do veículo:
    <input type="text" id="vehicleId" value="CAM-01">
  </label>
  <button onclick="startTracking()">Iniciar monitoramento</button>

  <p>
    <span id="statusIndicator" class="status-dot status-movimento"></span>
    <span id="statusText">Aguardando o início...</span><br>
    <strong>Total parado hoje:</strong>
    <span id="dailyStopped">00:00:00</span>
  </p>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>   
  var map = L.map("map").setView([-22.30, -53.85], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  // Estruturas por veículo
  var markers = {};      // marcador por veículo
  var polylines = {};    // trajeto por veículo
  var tracks = {};       // histórico por veículo

  // Função para atualizar todos os veículos
  function atualizarVeiculos() {
    fetch("/api/vehicles")
      .then(function (res) {
        return res.json();
      })
      .then(function (data) {
        for (var vehicleId in data) {
          var lat = data[vehicleId].latitude;
          var lon = data[vehicleId].longitude;

          // Cria histórico se não existir
          if (!tracks[vehicleId]) {
            tracks[vehicleId] = [];
          }

          tracks[vehicleId].push([lat, lon]);

          // Marcador
          if (!markers[vehicleId]) {
            markers[vehicleId] = L.marker([lat, lon])
              .addTo(map)
              .bindPopup("Veículo: " + vehicleId);
          } else {
            markers[vehicleId].setLatLng([lat, lon]);
          }

          // Trajeto
          if (!polylines[vehicleId]) {
            polylines[vehicleId] = L.polyline(tracks[vehicleId], {
              weight: 4
            }).addTo(map);
          } else {
            polylines[vehicleId].setLatLngs(tracks[vehicleId]);
          }
        }
      });
  }

  // Atualiza a cada 5 segundos
  setInterval(atualizarVeiculos, 5000);
  </script>

</body>
</html>
