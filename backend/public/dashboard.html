<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Frota</title>

  https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #map {
      height: 70vh;
      width: 100%;
      margin-top: 10px;
    }

    #sidebar {
      width: 220px;
      padding: 8px;
      border-right: 1px solid #ccc;
    }

    .vehicle-item {
      display: block;
      margin-bottom: 4px;
    }

    .empty {
      font-style: italic;
      color: #777;
    }
  </style>
</head>
<body>

<h2>Monitoramento de Veículos</h2>

<div style="display:flex;">
  <div id="sidebar">
    <h4>Veículos</h4>
    <div id="vehicleList"></div>
  </div>

  <div style="flex:1;">
    <div id="map"></div>
  </div>
</div>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.js

<script>
  var map = L.map("map").setView([-22.30, -53.85], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  var markers = {};
  var polylines = {};
  var tracks = {};
  var visibleVehicles = {};
  var colors = ["red", "blue", "green", "orange", "purple", "brown"];

  function renderVehicleList(vehicles) {
    var list = document.getElementById("vehicleList");

    if (Object.keys(vehicles).length === 0) {
      list.innerHTML = "<div class='empty'>Nenhum veículo transmitindo</div>";
      return;
    }

    Object.keys(vehicles).forEach(function(id) {
      if (document.getElementById("chk-" + id)) return;

      visibleVehicles[id] = true;

      var checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.id = "chk-" + id;
      checkbox.checked = true;
      checkbox.onchange = function () {
        visibleVehicles[id] = this.checked;
        toggleVehicle(id);
      };

      var label = document.createElement("label");
      label.className = "vehicle-item";
      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(" " + id));

      list.appendChild(label);
    });
  }

  function toggleVehicle(id) {
    if (!visibleVehicles[id]) {
      if (markers[id]) map.removeLayer(markers[id]);
      if (polylines[id]) map.removeLayer(polylines[id]);
    } else {
      if (markers[id]) markers[id].addTo(map);
      if (polylines[id]) polylines[id].addTo(map);
    }
  }

  function atualizarVeiculos() {
    fetch("/api/vehicles")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        renderVehicleList(data);

        var i = 0;
        for (var id in data) {
          var lat = data[id].latitude;
          var lon = data[id].longitude;

          if (!tracks[id]) tracks[id] = [];
          tracks[id].push([lat, lon]);

          var color = colors[i % colors.length];
          i++;

          if (!markers[id]) {
            markers[id] = L.marker([lat, lon]).bindPopup("Veículo: " + id);
            if (visibleVehicles[id]) markers[id].addTo(map);
          } else {
            markers[id].setLatLng([lat, lon]);
          }

          if (!polylines[id]) {
            polylines[id] = L.polyline(tracks[id], { color: color, weight: 4 });
            if (visibleVehicles[id]) polylines[id].addTo(map);
          } else {
            polylines[id].setLatLngs(tracks[id]);
          }
        }
      });
  }

  setInterval(atualizarVeiculos, 5000);
</script>

</body>
</html>
