<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Veículos</title>
</head>
<body>

  <h2>Monitoramento de veículos</h2>

  <label>
    Identificação do veículo:
    <input type="text" id="vehicleId" placeholder="CAM-01">
  </label>

  <br><br>

  <button onclick="startTracking()">Iniciar monitoramento</button>

  <p id="status">Aguardando o início...</p>

  <script>
    function startTracking() {
      const vehicleId = document.getElementById("vehicleId").value;

      if (!vehicleId) {
        alert("Informe a identificação do veículo");
        return;
      }

      if (!navigator.geolocation) {
        alert("Geolocalização não suportada neste navegador");
        return;
      }

      document.getElementById("status").innerText =
        "Monitoramento iniciado para " + vehicleId;

      navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const timestamp = new Date().toISOString();

          document.getElementById("status").innerText =
            "Veículo: " + vehicleId +
            " | Lat: " + lat.toFixed(6) +
            " | Lon: " + lon.toFixed(6);

          // Enviar GPS para o servidor
          fetch("/api/location", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              vehicleId: vehicleId,
              latitude: lat,
              longitude: lon,
              timestamp: timestamp
            })
          });
        },
        (error) => {
          alert("Erro ao obter localização");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 5000
        }
      );
    }
  </script>

</body>
</html>
